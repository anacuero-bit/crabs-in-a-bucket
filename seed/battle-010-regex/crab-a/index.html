<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regex Tester</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
    background: #0d1117;
    color: #c9d1d9;
    margin: 0; padding: 0; overflow: hidden; width: 100vw; height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 16px 24px;
  }
  h1 {
    font-size: 1.3rem;
    color: #58a6ff;
    margin-bottom: 2px;
    font-weight: 600;
  }
  .subtitle { color: #484f58; margin-bottom: 12px; font-size: 0.75rem; }
  .input-group { margin-bottom: 10px; }
  label {
    display: block;
    font-size: 0.7rem;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .regex-row {
    display: flex;
    align-items: center;
    gap: 0;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    overflow: hidden;
  }
  .regex-row .slash {
    padding: 8px 6px;
    color: #58a6ff;
    font-size: 1rem;
    user-select: none;
  }
  .regex-row input {
    flex: 1;
    background: transparent;
    border: none;
    color: #f0883e;
    font-family: inherit;
    font-size: 0.9rem;
    padding: 8px 0;
    outline: none;
  }
  .flags {
    display: flex;
    gap: 3px;
    padding: 3px 6px;
  }
  .flags button {
    background: transparent;
    border: 1px solid #30363d;
    color: #8b949e;
    width: 26px;
    height: 26px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.8rem;
  }
  .flags button.active { background: #1f6feb; color: #fff; border-color: #1f6feb; }
  textarea {
    width: 100%;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    color: #c9d1d9;
    font-family: inherit;
    font-size: 0.85rem;
    padding: 10px;
    height: 90px;
    resize: none;
    outline: none;
    line-height: 1.5;
  }
  textarea:focus, .regex-row:focus-within { border-color: #58a6ff; }
  .results {
    display: flex;
    gap: 16px;
    flex: 1;
    min-height: 0;
    margin-top: 10px;
  }
  .result-panel {
    flex: 1;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .result-panel h3 {
    font-size: 0.7rem;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
    flex-shrink: 0;
  }
  #highlightOutput {
    font-size: 0.85rem;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-all;
    overflow-y: auto;
    flex: 1;
  }
  .match-details-scroll {
    overflow-y: auto;
    flex: 1;
  }
  mark {
    background: rgba(88, 166, 255, 0.25);
    color: #58a6ff;
    border-radius: 2px;
    padding: 1px 2px;
    border-bottom: 2px solid #58a6ff;
  }
  .match-item {
    padding: 5px 8px;
    background: #0d1117;
    border-radius: 6px;
    margin-bottom: 4px;
    font-size: 0.78rem;
  }
  .match-item .idx { color: #484f58; margin-right: 6px; }
  .match-item .val { color: #7ee787; }
  .match-item .grp { color: #d2a8ff; font-size: 0.75rem; }
  .error-msg { color: #f85149; font-size: 0.8rem; margin-top: 4px; }
  .match-count {
    background: #1f6feb;
    color: #fff;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 0.7rem;
    margin-left: 6px;
  }
  .no-match { color: #484f58; font-style: italic; }
</style>
</head>
<body>
<h1>Regex Tester</h1>
<p class="subtitle">Real-time regular expression testing</p>

<div class="input-group">
  <label>Pattern</label>
  <div class="regex-row">
    <span class="slash">/</span>
    <input type="text" id="pattern" placeholder="enter regex pattern..." spellcheck="false">
    <span class="slash">/</span>
    <div class="flags">
      <button id="flag-g" class="active" onclick="toggleFlag('g')">g</button>
      <button id="flag-i" onclick="toggleFlag('i')">i</button>
      <button id="flag-m" onclick="toggleFlag('m')">m</button>
      <button id="flag-s" onclick="toggleFlag('s')">s</button>
    </div>
  </div>
</div>

<div class="input-group">
  <label>Test String</label>
  <textarea id="testString" placeholder="Enter text to test against...">The quick brown fox jumps over the lazy dog. The dog barked back at the fox.</textarea>
</div>

<div id="errorMsg" class="error-msg"></div>

<div class="results">
  <div class="result-panel" style="flex: 1.5;">
    <h3>Highlighted Matches <span id="matchCount" class="match-count" style="display:none;"></span></h3>
    <div id="highlightOutput"></div>
  </div>
  <div class="result-panel">
    <h3>Match Details</h3>
    <div class="match-details-scroll" id="matchDetails"></div>
  </div>
</div>

<script>
const flags = { g: true, i: false, m: false, s: false };
const patternInput = document.getElementById('pattern');
const testInput = document.getElementById('testString');

function toggleFlag(f) {
  flags[f] = !flags[f];
  document.getElementById('flag-' + f).classList.toggle('active');
  runTest();
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function runTest() {
  const p = patternInput.value;
  const t = testInput.value;
  const errorEl = document.getElementById('errorMsg');
  const highlightEl = document.getElementById('highlightOutput');
  const detailsEl = document.getElementById('matchDetails');
  const countEl = document.getElementById('matchCount');

  errorEl.textContent = '';
  if (!p) {
    highlightEl.innerHTML = escapeHtml(t);
    detailsEl.innerHTML = '<span class="no-match">Enter a pattern</span>';
    countEl.style.display = 'none';
    return;
  }

  let flagStr = Object.entries(flags).filter(([,v]) => v).map(([k]) => k).join('');
  let regex;
  try {
    regex = new RegExp(p, flagStr);
  } catch(e) {
    errorEl.textContent = e.message;
    highlightEl.innerHTML = escapeHtml(t);
    detailsEl.innerHTML = '';
    countEl.style.display = 'none';
    return;
  }

  const matches = [];
  let m;
  if (flags.g) {
    while ((m = regex.exec(t)) !== null) {
      matches.push({ index: m.index, value: m[0], groups: m.slice(1) });
      if (m[0].length === 0) regex.lastIndex++;
    }
  } else {
    m = regex.exec(t);
    if (m) matches.push({ index: m.index, value: m[0], groups: m.slice(1) });
  }

  if (matches.length === 0) {
    highlightEl.innerHTML = escapeHtml(t);
    detailsEl.innerHTML = '<span class="no-match">No matches found</span>';
    countEl.style.display = 'none';
    return;
  }

  countEl.style.display = 'inline';
  countEl.textContent = matches.length + ' match' + (matches.length > 1 ? 'es' : '');

  // Build highlighted output
  let html = '';
  let last = 0;
  for (const match of matches) {
    html += escapeHtml(t.slice(last, match.index));
    html += '<mark>' + escapeHtml(match.value) + '</mark>';
    last = match.index + match.value.length;
  }
  html += escapeHtml(t.slice(last));
  highlightEl.innerHTML = html;

  // Build details
  detailsEl.innerHTML = matches.map((match, i) => {
    let inner = `<span class="idx">#${i + 1}</span><span class="val">"${escapeHtml(match.value)}"</span> <span class="idx">@${match.index}</span>`;
    if (match.groups.length > 0) {
      inner += '<br>' + match.groups.map((g, gi) => `<span class="grp">  Group ${gi+1}: "${escapeHtml(g || '')}"</span>`).join('<br>');
    }
    return `<div class="match-item">${inner}</div>`;
  }).join('');
}

patternInput.addEventListener('input', runTest);
testInput.addEventListener('input', runTest);
runTest();
</script>
</body>
</html>
