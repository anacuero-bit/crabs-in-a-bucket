<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Timer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    color: #eee;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .app {
    text-align: center;
    max-width: 400px;
    width: 100%;
    padding: 20px;
  }
  .mode-tabs {
    display: flex;
    gap: 4px;
    justify-content: center;
    margin-bottom: 40px;
    background: #1a1a1a;
    border-radius: 12px;
    padding: 4px;
  }
  .mode-tab {
    padding: 10px 20px;
    border: none;
    background: transparent;
    color: #666;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    border-radius: 10px;
    transition: all 0.2s;
    flex: 1;
  }
  .mode-tab.active {
    background: #e74c3c;
    color: #fff;
  }
  .mode-tab.active.break-mode {
    background: #27ae60;
  }
  .timer-display {
    font-size: 6rem;
    font-weight: 200;
    letter-spacing: 4px;
    margin-bottom: 40px;
    font-variant-numeric: tabular-nums;
    color: #fff;
    line-height: 1;
  }
  .timer-display.break-active {
    color: #27ae60;
  }
  .controls {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 40px;
  }
  .ctrl-btn {
    padding: 14px 36px;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .start-btn {
    background: #e74c3c;
    color: #fff;
    min-width: 140px;
  }
  .start-btn:hover { background: #c0392b; }
  .start-btn.running { background: #f39c12; }
  .start-btn.running:hover { background: #d68910; }
  .start-btn.break-mode { background: #27ae60; }
  .start-btn.break-mode:hover { background: #219a52; }
  .reset-btn {
    background: #1a1a1a;
    color: #888;
    border: 1px solid #333;
  }
  .reset-btn:hover { background: #222; color: #ccc; }

  .settings {
    background: #1a1a1a;
    border-radius: 16px;
    padding: 24px;
    border: 1px solid #222;
  }
  .settings h3 {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #555;
    margin-bottom: 20px;
  }
  .setting-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .setting-row:last-child { margin-bottom: 0; }
  .setting-label {
    font-size: 0.9rem;
    color: #aaa;
  }
  .setting-control {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .adj-btn {
    width: 32px;
    height: 32px;
    border: 1px solid #333;
    background: #222;
    color: #aaa;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .adj-btn:hover { background: #333; color: #fff; }
  .setting-value {
    font-size: 1rem;
    font-weight: 600;
    color: #fff;
    min-width: 40px;
    text-align: center;
  }
  .status-line {
    margin-top: 24px;
    font-size: 0.8rem;
    color: #444;
  }
</style>
</head>
<body>
<div class="app">
  <div class="mode-tabs">
    <button class="mode-tab active" id="tabWork" onclick="switchMode('work')">Focus</button>
    <button class="mode-tab" id="tabShort" onclick="switchMode('short')">Short Break</button>
    <button class="mode-tab" id="tabLong" onclick="switchMode('long')">Long Break</button>
  </div>

  <div class="timer-display" id="timerDisplay">25:00</div>

  <div class="controls">
    <button class="ctrl-btn start-btn" id="startBtn" onclick="toggleTimer()">Start</button>
    <button class="ctrl-btn reset-btn" onclick="resetTimer()">Reset</button>
  </div>

  <div class="settings">
    <h3>Duration (minutes)</h3>
    <div class="setting-row">
      <span class="setting-label">Focus</span>
      <div class="setting-control">
        <button class="adj-btn" onclick="adjustSetting('work', -5)">-</button>
        <span class="setting-value" id="workVal">25</span>
        <button class="adj-btn" onclick="adjustSetting('work', 5)">+</button>
      </div>
    </div>
    <div class="setting-row">
      <span class="setting-label">Short Break</span>
      <div class="setting-control">
        <button class="adj-btn" onclick="adjustSetting('short', -1)">-</button>
        <span class="setting-value" id="shortVal">5</span>
        <button class="adj-btn" onclick="adjustSetting('short', 1)">+</button>
      </div>
    </div>
    <div class="setting-row">
      <span class="setting-label">Long Break</span>
      <div class="setting-control">
        <button class="adj-btn" onclick="adjustSetting('long', -5)">-</button>
        <span class="setting-value" id="longVal">15</span>
        <button class="adj-btn" onclick="adjustSetting('long', 5)">+</button>
      </div>
    </div>
  </div>

  <div class="status-line" id="status">Ready to focus</div>
</div>

<script>
let durations = { work: 25, short: 5, long: 15 };
let currentMode = 'work';
let timeLeft = durations.work * 60;
let running = false;
let timerInterval = null;
let sessions = 0;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playBeep() {
  // Three ascending beeps
  [0, 200, 400].forEach((delay, i) => {
    setTimeout(() => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = 600 + i * 200;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.3);
    }, delay);
  });
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
}

function updateDisplay() {
  document.getElementById('timerDisplay').textContent = formatTime(timeLeft);
  document.title = `${formatTime(timeLeft)} - Pomodoro`;

  const isBreak = currentMode !== 'work';
  document.getElementById('timerDisplay').classList.toggle('break-active', isBreak && running);
}

function switchMode(mode) {
  if (running) return;
  currentMode = mode;
  timeLeft = durations[mode] * 60;

  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active', 'break-mode'));
  const tab = mode === 'work' ? 'tabWork' : mode === 'short' ? 'tabShort' : 'tabLong';
  const el = document.getElementById(tab);
  el.classList.add('active');
  if (mode !== 'work') el.classList.add('break-mode');

  const btn = document.getElementById('startBtn');
  btn.classList.toggle('break-mode', mode !== 'work');

  updateDisplay();
  updateStatus();
}

function toggleTimer() {
  if (running) {
    pauseTimer();
  } else {
    startTimer();
  }
}

function startTimer() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  running = true;
  document.getElementById('startBtn').textContent = 'Pause';
  document.getElementById('startBtn').classList.add('running');
  updateStatus();

  timerInterval = setInterval(() => {
    timeLeft--;
    if (timeLeft <= 0) {
      timeLeft = 0;
      clearInterval(timerInterval);
      running = false;
      playBeep();

      if (currentMode === 'work') {
        sessions++;
        document.getElementById('startBtn').textContent = 'Start';
        document.getElementById('startBtn').classList.remove('running');
        // Auto switch to break
        if (sessions % 4 === 0) {
          switchMode('long');
        } else {
          switchMode('short');
        }
        updateStatus();
      } else {
        switchMode('work');
      }
    }
    updateDisplay();
  }, 1000);
}

function pauseTimer() {
  running = false;
  clearInterval(timerInterval);
  document.getElementById('startBtn').textContent = 'Resume';
  document.getElementById('startBtn').classList.remove('running');
  updateStatus();
}

function resetTimer() {
  running = false;
  clearInterval(timerInterval);
  timeLeft = durations[currentMode] * 60;
  document.getElementById('startBtn').textContent = 'Start';
  document.getElementById('startBtn').classList.remove('running');
  updateDisplay();
  updateStatus();
}

function adjustSetting(key, delta) {
  if (running) return;
  durations[key] = Math.max(1, durations[key] + delta);
  document.getElementById(key + 'Val').textContent = durations[key];
  if (key === currentMode) {
    timeLeft = durations[key] * 60;
    updateDisplay();
  }
}

function updateStatus() {
  const el = document.getElementById('status');
  if (running) {
    el.textContent = currentMode === 'work' ? `Focusing... (Session ${sessions + 1})` : 'Taking a break...';
  } else {
    el.textContent = `${sessions} sessions completed`;
  }
}

updateDisplay();
</script>
</body>
</html>
