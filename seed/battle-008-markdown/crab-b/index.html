<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Notepad</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f8f9fa;
    color: #1a1a1a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Top bar */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: #fff;
    border-bottom: 1px solid #e5e7eb;
    flex-shrink: 0;
  }
  .logo {
    font-size: 1.1rem;
    font-weight: 700;
    color: #1a1a1a;
  }
  .logo span { color: #6366f1; }
  .top-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .top-btn {
    padding: 7px 14px;
    border: 1px solid #e5e7eb;
    background: #fff;
    color: #6b7280;
    border-radius: 8px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 500;
  }
  .top-btn:hover { background: #f3f4f6; color: #111; }
  .top-btn.primary { background: #6366f1; color: #fff; border-color: #6366f1; }
  .top-btn.primary:hover { background: #4f46e5; }

  /* Tab bar */
  .tab-bar {
    display: flex;
    gap: 0;
    background: #fff;
    border-bottom: 2px solid #e5e7eb;
    padding: 0 20px;
    flex-shrink: 0;
  }
  .tab {
    padding: 10px 24px;
    font-size: 0.85rem;
    font-weight: 500;
    color: #9ca3af;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: all 0.15s;
    user-select: none;
  }
  .tab:hover { color: #6b7280; }
  .tab.active {
    color: #6366f1;
    border-bottom-color: #6366f1;
    font-weight: 600;
  }

  /* Formatting toolbar (edit mode only) */
  .format-bar {
    display: flex;
    gap: 2px;
    padding: 8px 20px;
    background: #fff;
    border-bottom: 1px solid #e5e7eb;
    flex-shrink: 0;
  }
  .format-bar.hidden { display: none; }
  .fmt-btn {
    padding: 6px 10px;
    border: none;
    background: transparent;
    color: #6b7280;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.15s;
  }
  .fmt-btn:hover { background: #f3f4f6; color: #111; }
  .fmt-sep { width: 1px; background: #e5e7eb; margin: 4px 6px; }

  /* Content area */
  .content {
    flex: 1;
    overflow: hidden;
    position: relative;
  }
  .edit-pane, .preview-pane {
    position: absolute;
    inset: 0;
    transition: opacity 0.2s;
  }
  .edit-pane.hidden, .preview-pane.hidden {
    opacity: 0;
    pointer-events: none;
  }
  #editor {
    width: 100%;
    height: 100%;
    border: none;
    padding: 24px 20px;
    font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
    font-size: 0.9rem;
    line-height: 1.8;
    resize: none;
    outline: none;
    background: #fefefe;
    color: #1a1a1a;
    tab-size: 2;
  }
  #editor::placeholder { color: #d1d5db; }
  .preview-pane {
    overflow-y: auto;
    padding: 24px 20px;
    background: #fff;
  }

  /* Preview rendered markdown */
  .preview-pane h1 { font-size: 2rem; font-weight: 700; margin: 0 0 16px; color: #111; border-bottom: 2px solid #e5e7eb; padding-bottom: 8px; }
  .preview-pane h2 { font-size: 1.5rem; font-weight: 700; margin: 28px 0 12px; color: #111; border-bottom: 1px solid #e5e7eb; padding-bottom: 6px; }
  .preview-pane h3 { font-size: 1.2rem; font-weight: 600; margin: 20px 0 8px; color: #222; }
  .preview-pane h4 { font-size: 1rem; font-weight: 600; margin: 16px 0 6px; color: #333; }
  .preview-pane p { margin: 0 0 14px; line-height: 1.75; color: #374151; }
  .preview-pane strong { font-weight: 600; color: #111; }
  .preview-pane em { font-style: italic; color: #6b21a8; }
  .preview-pane code {
    background: #f3f4f6;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'SF Mono', monospace;
    font-size: 0.85em;
    color: #e11d48;
    border: 1px solid #e5e7eb;
  }
  .preview-pane pre {
    background: #1e1e2e;
    border-radius: 10px;
    padding: 18px;
    margin: 0 0 16px;
    overflow-x: auto;
  }
  .preview-pane pre code {
    background: none;
    padding: 0;
    border: none;
    color: #cdd6f4;
    font-size: 0.85rem;
    line-height: 1.65;
  }
  .preview-pane a { color: #6366f1; text-decoration: none; font-weight: 500; }
  .preview-pane a:hover { text-decoration: underline; }
  .preview-pane blockquote {
    border-left: 4px solid #6366f1;
    padding: 8px 16px;
    margin: 0 0 16px;
    background: #f5f3ff;
    color: #6b7280;
    border-radius: 0 8px 8px 0;
  }
  .preview-pane ul, .preview-pane ol { margin: 0 0 16px; padding-left: 28px; }
  .preview-pane li { margin-bottom: 6px; line-height: 1.7; color: #374151; }
  .preview-pane hr { border: none; border-top: 2px solid #e5e7eb; margin: 28px 0; }
  .preview-pane table { border-collapse: collapse; margin: 0 0 16px; width: 100%; border-radius: 8px; overflow: hidden; }
  .preview-pane th, .preview-pane td { border: 1px solid #e5e7eb; padding: 10px 14px; text-align: left; }
  .preview-pane th { background: #f9fafb; font-weight: 600; color: #111; }
  .preview-pane tr:nth-child(even) { background: #fafafa; }
  .preview-pane .task-list { list-style: none; padding-left: 4px; }
  .preview-pane .task-list li { display: flex; align-items: flex-start; gap: 8px; }
  .preview-pane .task-list input { margin-top: 5px; }

  /* Status bar */
  .status-bar {
    padding: 6px 20px;
    background: #fff;
    border-top: 1px solid #e5e7eb;
    font-size: 0.72rem;
    color: #9ca3af;
    display: flex;
    justify-content: space-between;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="top-bar">
  <div class="logo">Markdown<span>Pad</span></div>
  <div class="top-actions">
    <button class="top-btn" onclick="clearEditor()">New</button>
    <button class="top-btn" onclick="downloadMd()">Download .md</button>
    <button class="top-btn primary" onclick="copyHtml()">Copy HTML</button>
  </div>
</div>

<div class="tab-bar">
  <div class="tab active" data-tab="edit" onclick="switchTab('edit')">Edit</div>
  <div class="tab" data-tab="preview" onclick="switchTab('preview')">Preview</div>
</div>

<div class="format-bar" id="formatBar">
  <button class="fmt-btn" onclick="fmt('**','**')" title="Bold"><b>B</b></button>
  <button class="fmt-btn" onclick="fmt('*','*')" title="Italic"><i>I</i></button>
  <button class="fmt-btn" onclick="fmt('~~','~~')" title="Strikethrough"><s>S</s></button>
  <div class="fmt-sep"></div>
  <button class="fmt-btn" onclick="fmt('`','`')" title="Code">&lt;/&gt;</button>
  <button class="fmt-btn" onclick="fmtBlock('```\n','\n```')" title="Code Block">{ }</button>
  <div class="fmt-sep"></div>
  <button class="fmt-btn" onclick="fmtLine('# ')" title="H1">H1</button>
  <button class="fmt-btn" onclick="fmtLine('## ')" title="H2">H2</button>
  <button class="fmt-btn" onclick="fmtLine('### ')" title="H3">H3</button>
  <div class="fmt-sep"></div>
  <button class="fmt-btn" onclick="fmtLine('- ')" title="Bullet List">&#8226;</button>
  <button class="fmt-btn" onclick="fmtLine('1. ')" title="Numbered List">1.</button>
  <button class="fmt-btn" onclick="fmtLine('- [ ] ')" title="Checklist">&#9744;</button>
  <div class="fmt-sep"></div>
  <button class="fmt-btn" onclick="fmtLine('> ')" title="Quote">&ldquo;&rdquo;</button>
  <button class="fmt-btn" onclick="fmt('[','](url)')" title="Link">Link</button>
  <button class="fmt-btn" onclick="insertTable()" title="Table">Table</button>
</div>

<div class="content">
  <div class="edit-pane" id="editPane">
    <textarea id="editor" placeholder="Start writing markdown..." spellcheck="false"></textarea>
  </div>
  <div class="preview-pane hidden" id="previewPane"></div>
</div>

<div class="status-bar">
  <span id="stats">0 words, 0 characters</span>
  <span>Markdown</span>
</div>

<script>
const editor = document.getElementById('editor');
const previewPane = document.getElementById('previewPane');

const defaultMd = `# Markdown Notepad

A clean editor for writing and previewing **Markdown**. Switch between Edit and Preview tabs to see your rendered output.

## Supported Features

### Text Formatting
- **Bold text** and *italic text*
- ~~Strikethrough~~ for deleted content
- \`Inline code\` for technical terms

### Lists

1. First ordered item
2. Second ordered item
3. Third ordered item

- Unordered item A
- Unordered item B
  - Nested item

### Task Lists

- [ ] Write documentation
- [x] Set up project structure
- [ ] Add more features

### Code Blocks

\`\`\`python
def fibonacci(n):
    a, b = 0, 1
    for _ in range(n):
        yield a
        a, b = b, a + b

print(list(fibonacci(10)))
\`\`\`

### Tables

| Language | Type System | Year |
|----------|------------|------|
| Python | Dynamic | 1991 |
| TypeScript | Static | 2012 |
| Rust | Static | 2010 |
| Go | Static | 2009 |

### Blockquotes

> The best way to predict the future is to invent it.
> -- Alan Kay

### Links & Images

Visit [GitHub](https://github.com) for more.

---

*Switch to Preview tab to see the rendered output.*`;

editor.value = defaultMd;
updateStats();

let currentTab = 'edit';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('editPane').classList.toggle('hidden', tab !== 'edit');
  document.getElementById('previewPane').classList.toggle('hidden', tab !== 'preview');
  document.getElementById('formatBar').classList.toggle('hidden', tab !== 'edit');
  if (tab === 'preview') renderPreview();
}

function renderPreview() {
  previewPane.innerHTML = parseMd(editor.value);
}

function parseMd(md) {
  let html = md;

  // Code blocks
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    return `<pre><code>${esc(code.trim())}</code></pre>`;
  });

  const lines = html.split('\n');
  let out = [];
  let inList = null; // 'ul' | 'ol' | 'task'
  let inTable = false;
  let tableRows = [];

  for (let i = 0; i < lines.length; i++) {
    let line = lines[i];

    if (line.startsWith('<pre>') || line.includes('<pre>') || line.includes('</pre>')) {
      out.push(line);
      continue;
    }

    // Table
    if (line.match(/^\|(.+)\|$/)) {
      if (!inTable) { inTable = true; tableRows = []; }
      if (line.match(/^\|[\s\-:|]+\|$/)) continue;
      tableRows.push(line);
      if (!lines[i+1] || !lines[i+1].match(/^\|(.+)\|$/)) {
        let t = '<table>';
        tableRows.forEach((r, idx) => {
          const cells = r.split('|').filter(c => c !== '');
          const tag = idx === 0 ? 'th' : 'td';
          t += '<tr>' + cells.map(c => `<${tag}>${inline(c.trim())}</${tag}>`).join('') + '</tr>';
        });
        t += '</table>';
        out.push(t);
        inTable = false;
      }
      continue;
    }

    // End list
    if (inList && !line.match(/^[\s]*[-*+]\s/) && !line.match(/^[\s]*\d+\.\s/) && line.trim() !== '') {
      out.push(inList === 'task' ? '</ul>' : inList === 'ol' ? '</ol>' : '</ul>');
      inList = null;
    }

    // Headings
    if (line.match(/^#{1,6}\s/)) {
      const lvl = line.match(/^(#{1,6})/)[1].length;
      out.push(`<h${lvl}>${inline(line.replace(/^#{1,6}\s+/, ''))}</h${lvl}>`);
      continue;
    }

    // HR
    if (line.match(/^(\-{3,}|\*{3,}|_{3,})$/)) { out.push('<hr>'); continue; }

    // Blockquote
    if (line.match(/^>\s?/)) {
      out.push(`<blockquote><p>${inline(line.replace(/^>\s?/, ''))}</p></blockquote>`);
      continue;
    }

    // Task list
    if (line.match(/^[\s]*-\s\[[ x]\]\s/)) {
      if (inList !== 'task') {
        if (inList) out.push(inList === 'ol' ? '</ol>' : '</ul>');
        out.push('<ul class="task-list">');
        inList = 'task';
      }
      const checked = line.includes('[x]');
      const text = line.replace(/^[\s]*-\s\[[ x]\]\s+/, '');
      out.push(`<li><input type="checkbox" ${checked ? 'checked' : ''} disabled> ${inline(text)}</li>`);
      continue;
    }

    // UL
    if (line.match(/^[\s]*[-*+]\s/)) {
      if (inList !== 'ul') {
        if (inList) out.push(inList === 'ol' ? '</ol>' : '</ul>');
        out.push('<ul>');
        inList = 'ul';
      }
      out.push(`<li>${inline(line.replace(/^[\s]*[-*+]\s+/, ''))}</li>`);
      continue;
    }

    // OL
    if (line.match(/^[\s]*\d+\.\s/)) {
      if (inList !== 'ol') {
        if (inList) out.push(inList === 'ul' ? '</ul>' : '</ul>');
        out.push('<ol>');
        inList = 'ol';
      }
      out.push(`<li>${inline(line.replace(/^[\s]*\d+\.\s+/, ''))}</li>`);
      continue;
    }

    // Empty
    if (line.trim() === '') {
      if (inList) {
        out.push(inList === 'ol' ? '</ol>' : '</ul>');
        inList = null;
      }
      out.push('');
      continue;
    }

    out.push(`<p>${inline(line)}</p>`);
  }

  if (inList) out.push(inList === 'ol' ? '</ol>' : '</ul>');
  return out.join('\n');
}

function inline(t) {
  t = t.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%;border-radius:6px">');
  t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  t = t.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/__(.+?)__/g, '<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
  t = t.replace(/_(.+?)_/g, '<em>$1</em>');
  t = t.replace(/~~(.+?)~~/g, '<s>$1</s>');
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  return t;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Formatting helpers
function fmt(before, after) {
  const s = editor.selectionStart, e = editor.selectionEnd;
  const sel = editor.value.substring(s, e) || 'text';
  editor.setRangeText(before + sel + after, s, e, 'select');
  editor.focus();
  updateStats();
}

function fmtBlock(before, after) {
  const s = editor.selectionStart, e = editor.selectionEnd;
  const sel = editor.value.substring(s, e) || 'code here';
  editor.setRangeText(before + sel + after, s, e, 'select');
  editor.focus();
  updateStats();
}

function fmtLine(prefix) {
  const s = editor.selectionStart;
  const lineStart = editor.value.lastIndexOf('\n', s - 1) + 1;
  editor.setRangeText(prefix, lineStart, lineStart, 'end');
  editor.focus();
  updateStats();
}

function insertTable() {
  const table = '\n| Header 1 | Header 2 | Header 3 |\n|----------|----------|----------|\n| Cell 1   | Cell 2   | Cell 3   |\n| Cell 4   | Cell 5   | Cell 6   |\n';
  const s = editor.selectionStart;
  editor.setRangeText(table, s, s, 'end');
  editor.focus();
  updateStats();
}

function updateStats() {
  const text = editor.value;
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  document.getElementById('stats').textContent = `${words} words, ${text.length} characters`;
}

function clearEditor() {
  if (confirm('Start a new document? Current content will be lost.')) {
    editor.value = '';
    updateStats();
  }
}

function downloadMd() {
  const blob = new Blob([editor.value], {type: 'text/markdown'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'document.md';
  a.click();
  URL.revokeObjectURL(a.href);
}

function copyHtml() {
  const html = parseMd(editor.value);
  navigator.clipboard.writeText(html).then(() => {
    const btn = event.target;
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

// Tab key support
editor.addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = editor.selectionStart;
    editor.setRangeText('  ', s, s, 'end');
    updateStats();
  }
});

editor.addEventListener('input', updateStats);
</script>
</body>
</html>
