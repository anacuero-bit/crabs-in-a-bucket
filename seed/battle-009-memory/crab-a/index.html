<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Card Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f1a;
    color: #e0e0e0;
    margin: 0; padding: 0; overflow: hidden; width: 100vw; height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  h1 {
    font-size: 1.5rem;
    margin-bottom: 6px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .stats {
    display: flex;
    gap: 24px;
    margin-bottom: 12px;
    font-size: 0.95rem;
  }
  .stats span { color: #888; }
  .stats strong { color: #667eea; }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 90px);
    gap: 10px;
    margin-bottom: 14px;
  }
  .card {
    width: 90px;
    height: 90px;
    background: #1a1a2e;
    border: 2px solid #2a2a4a;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.2rem;
    cursor: pointer;
    transition: all 0.3s ease;
    user-select: none;
  }
  .card:hover { border-color: #667eea; transform: scale(1.05); }
  .card.flipped {
    background: #1e1e3a;
    border-color: #667eea;
    box-shadow: 0 0 15px rgba(102, 126, 234, 0.3);
  }
  .card.matched {
    background: #1a2e1a;
    border-color: #4caf50;
    box-shadow: 0 0 15px rgba(76, 175, 80, 0.3);
    cursor: default;
  }
  .card .front { display: none; }
  .card .back { display: block; color: #333; font-size: 1.3rem; }
  .card.flipped .front, .card.matched .front { display: block; }
  .card.flipped .back, .card.matched .back { display: none; }
  button {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    padding: 10px 28px;
    border-radius: 8px;
    font-size: 0.9rem;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4); }
  .win-msg {
    font-size: 1.2rem;
    color: #4caf50;
    margin-bottom: 10px;
    display: none;
  }
  .win-msg.show { display: block; }
</style>
</head>
<body>
<h1>Memory Game</h1>
<div class="stats">
  <div><span>Moves: </span><strong id="moves">0</strong></div>
  <div><span>Time: </span><strong id="timer">0:00</strong></div>
  <div><span>Matches: </span><strong id="matches">0</strong><span> / 8</span></div>
</div>
<div class="grid" id="grid"></div>
<div class="win-msg" id="winMsg">You won! Well done!</div>
<button onclick="initGame()">New Game</button>

<script>
const emojis = ['🚀','🎮','🎵','🌟','🔥','💎','🎯','🦊'];
let cards = [];
let flipped = [];
let matched = 0;
let moves = 0;
let timerInterval = null;
let seconds = 0;
let locked = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startTimer() {
  if (timerInterval) return;
  seconds = 0;
  timerInterval = setInterval(() => {
    seconds++;
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2, '0')}`;
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}

function initGame() {
  stopTimer();
  matched = 0;
  moves = 0;
  flipped = [];
  locked = false;
  seconds = 0;
  document.getElementById('moves').textContent = '0';
  document.getElementById('timer').textContent = '0:00';
  document.getElementById('matches').textContent = '0';
  document.getElementById('winMsg').classList.remove('show');

  cards = shuffle([...emojis, ...emojis]);
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  cards.forEach((emoji, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.index = i;
    card.innerHTML = `<span class="front">${emoji}</span><span class="back">?</span>`;
    card.addEventListener('click', () => flipCard(card, i));
    grid.appendChild(card);
  });
}

function flipCard(card, index) {
  if (locked) return;
  if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
  if (flipped.length >= 2) return;

  if (moves === 0 && flipped.length === 0) startTimer();

  card.classList.add('flipped');
  flipped.push({ card, index });

  if (flipped.length === 2) {
    moves++;
    document.getElementById('moves').textContent = moves;

    const [a, b] = flipped;
    if (cards[a.index] === cards[b.index]) {
      a.card.classList.add('matched');
      b.card.classList.add('matched');
      matched++;
      document.getElementById('matches').textContent = matched;
      flipped = [];

      if (matched === 8) {
        stopTimer();
        document.getElementById('winMsg').classList.add('show');
      }
    } else {
      locked = true;
      setTimeout(() => {
        a.card.classList.remove('flipped');
        b.card.classList.remove('flipped');
        flipped = [];
        locked = false;
      }, 800);
    }
  }
}

initGame();
</script>
</body>
</html>
