<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pattern Memory</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  h1 {
    font-size: 2.2rem;
    font-weight: 300;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 20px;
    color: #e94560;
  }
  .info-bar {
    display: flex;
    gap: 40px;
    margin-bottom: 24px;
    font-size: 0.95rem;
    letter-spacing: 1px;
  }
  .info-bar div { text-align: center; }
  .info-bar .val {
    font-size: 1.8rem;
    font-weight: 700;
    color: #e94560;
    display: block;
  }
  .info-bar .lbl { color: #888; text-transform: uppercase; font-size: 0.7rem; }
  .board {
    display: grid;
    grid-template-columns: repeat(4, 110px);
    grid-template-rows: repeat(3, 110px);
    gap: 14px;
    perspective: 1000px;
    margin-bottom: 28px;
  }
  .card {
    width: 110px;
    height: 110px;
    position: relative;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 0.5s ease;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card.matched { transform: rotateY(180deg); }
  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-back {
    background: linear-gradient(145deg, #1a1a3e, #2a2a5e);
    border: 2px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-back::after {
    content: '?';
    font-size: 2rem;
    color: #555;
  }
  .card:hover .card-back { border-color: #e94560; }
  .card-front {
    transform: rotateY(180deg);
    border: 2px solid rgba(255,255,255,0.15);
  }
  .card.matched .card-front {
    border-color: #4caf50;
    box-shadow: 0 0 20px rgba(76, 175, 80, 0.4);
  }
  .pattern {
    width: 70px;
    height: 70px;
    border-radius: 8px;
  }
  button {
    background: #e94560;
    color: white;
    border: none;
    padding: 14px 40px;
    border-radius: 50px;
    font-size: 0.95rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
  }
  button:hover { background: #c73650; transform: scale(1.05); }
  #victory {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #victory.show { display: flex; }
  #victory h2 {
    font-size: 3rem;
    color: #e94560;
    margin-bottom: 10px;
    animation: pulse 1s ease infinite;
  }
  #victory p { font-size: 1.2rem; color: #aaa; margin-bottom: 20px; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }
  .confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -10px;
    animation: fall linear forwards;
    z-index: 101;
  }
  @keyframes fall {
    to { top: 110vh; transform: rotate(720deg); }
  }
</style>
</head>
<body>
<h1>Pattern Memory</h1>
<div class="info-bar">
  <div><span class="val" id="movesVal">0</span><span class="lbl">Moves</span></div>
  <div><span class="val" id="timeVal">0:00</span><span class="lbl">Time</span></div>
  <div><span class="val" id="pairsVal">0/6</span><span class="lbl">Pairs</span></div>
</div>
<div class="board" id="board"></div>
<button onclick="startGame()">New Game</button>

<div id="victory">
  <h2>Victory!</h2>
  <p id="victoryStats"></p>
  <button onclick="document.getElementById('victory').classList.remove('show'); startGame();">Play Again</button>
</div>

<script>
const patterns = [
  { bg: '#e94560', shape: 'circle' },
  { bg: '#0f3460', shape: 'diamond' },
  { bg: '#533483', shape: 'cross' },
  { bg: '#e94560', shape: 'stripes' },
  { bg: '#16c79a', shape: 'dots' },
  { bg: '#f5a623', shape: 'triangle' },
];

let cards = [], first = null, second = null;
let moves = 0, pairs = 0, timer = null, secs = 0, busy = false;

function createPatternSVG(p) {
  const c = p.bg;
  switch(p.shape) {
    case 'circle':
      return `<svg viewBox="0 0 70 70" width="70" height="70"><rect width="70" height="70" rx="8" fill="${c}"/><circle cx="35" cy="35" r="22" fill="none" stroke="white" stroke-width="3"/><circle cx="35" cy="35" r="10" fill="white" opacity="0.5"/></svg>`;
    case 'diamond':
      return `<svg viewBox="0 0 70 70" width="70" height="70"><rect width="70" height="70" rx="8" fill="${c}"/><polygon points="35,8 62,35 35,62 8,35" fill="none" stroke="white" stroke-width="3"/></svg>`;
    case 'cross':
      return `<svg viewBox="0 0 70 70" width="70" height="70"><rect width="70" height="70" rx="8" fill="${c}"/><line x1="20" y1="20" x2="50" y2="50" stroke="white" stroke-width="4"/><line x1="50" y1="20" x2="20" y2="50" stroke="white" stroke-width="4"/></svg>`;
    case 'stripes':
      return `<svg viewBox="0 0 70 70" width="70" height="70"><rect width="70" height="70" rx="8" fill="${c}"/><line x1="10" y1="20" x2="60" y2="20" stroke="white" stroke-width="3" opacity="0.7"/><line x1="10" y1="35" x2="60" y2="35" stroke="white" stroke-width="3"/><line x1="10" y1="50" x2="60" y2="50" stroke="white" stroke-width="3" opacity="0.7"/></svg>`;
    case 'dots':
      return `<svg viewBox="0 0 70 70" width="70" height="70"><rect width="70" height="70" rx="8" fill="${c}"/><circle cx="22" cy="22" r="6" fill="white" opacity="0.8"/><circle cx="48" cy="22" r="6" fill="white" opacity="0.8"/><circle cx="35" cy="48" r="6" fill="white" opacity="0.8"/></svg>`;
    case 'triangle':
      return `<svg viewBox="0 0 70 70" width="70" height="70"><rect width="70" height="70" rx="8" fill="${c}"/><polygon points="35,12 58,55 12,55" fill="none" stroke="white" stroke-width="3"/></svg>`;
  }
}

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startTimer() {
  secs = 0;
  clearInterval(timer);
  timer = setInterval(() => {
    secs++;
    document.getElementById('timeVal').textContent = `${Math.floor(secs/60)}:${(secs%60).toString().padStart(2,'0')}`;
  }, 1000);
}

function spawnConfetti() {
  const colors = ['#e94560','#f5a623','#16c79a','#533483','#667eea','#fff'];
  for (let i = 0; i < 60; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    c.style.width = (Math.random() * 8 + 5) + 'px';
    c.style.height = (Math.random() * 8 + 5) + 'px';
    c.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
    c.style.animationDelay = (Math.random() * 1) + 's';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 4000);
  }
}

function startGame() {
  clearInterval(timer);
  moves = 0; pairs = 0; first = null; second = null; busy = false;
  document.getElementById('movesVal').textContent = '0';
  document.getElementById('timeVal').textContent = '0:00';
  document.getElementById('pairsVal').textContent = '0/6';

  cards = shuffle([...patterns, ...patterns].map((p, i) => ({ ...p, id: i })));
  const board = document.getElementById('board');
  board.innerHTML = '';

  cards.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.idx = i;
    card.innerHTML = `
      <div class="card-face card-back"></div>
      <div class="card-face card-front">${createPatternSVG(p)}</div>
    `;
    card.addEventListener('click', () => flipCard(card, i));
    board.appendChild(card);
  });

  timer = null;
}

function flipCard(el, idx) {
  if (busy) return;
  if (el.classList.contains('flipped') || el.classList.contains('matched')) return;

  if (!timer) startTimer();

  el.classList.add('flipped');

  if (!first) {
    first = { el, idx };
  } else {
    second = { el, idx };
    moves++;
    document.getElementById('movesVal').textContent = moves;
    busy = true;

    const a = cards[first.idx], b = cards[second.idx];
    if (a.shape === b.shape && a.bg === b.bg) {
      first.el.classList.add('matched');
      second.el.classList.add('matched');
      pairs++;
      document.getElementById('pairsVal').textContent = `${pairs}/6`;
      first = null; second = null; busy = false;

      if (pairs === 6) {
        clearInterval(timer);
        setTimeout(() => {
          spawnConfetti();
          document.getElementById('victoryStats').textContent = `${moves} moves in ${Math.floor(secs/60)}:${(secs%60).toString().padStart(2,'0')}`;
          document.getElementById('victory').classList.add('show');
        }, 400);
      }
    } else {
      setTimeout(() => {
        first.el.classList.remove('flipped');
        second.el.classList.remove('flipped');
        first = null; second = null; busy = false;
      }, 700);
    }
  }
}

startGame();
</script>
</body>
</html>
