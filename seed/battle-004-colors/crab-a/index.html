<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Palette Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#ddd;font-family:Arial,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0;padding:0;overflow:hidden;width:100vw;height:100vh}
h1{font-size:22px;margin-bottom:14px;color:#ccc}
.input-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;justify-content:center}
input[type=text]{padding:10px 16px;font-size:15px;background:#12122a;color:#eee;border:1px solid #444;border-radius:6px;width:220px;outline:none}
input[type=text]:focus{border-color:#58a6ff}
button{padding:10px 24px;font-size:15px;background:#334;color:#eee;border:1px solid #556;border-radius:6px;cursor:pointer}
button:hover{background:#445}
#palette{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:16px}
.swatch{width:100px;height:120px;border-radius:8px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;cursor:pointer;transition:transform 0.15s;border:2px solid transparent}
.swatch:hover{transform:scale(1.05);border-color:#fff3}
.swatch span{background:rgba(0,0,0,0.5);padding:3px 8px;border-radius:4px;font-size:12px;font-family:monospace}
#copied{font-size:13px;color:#0f6;margin-top:12px;min-height:20px}
</style>
</head>
<body>
<h1>Color Palette Generator</h1>
<div class="input-row">
  <input type="text" id="input" placeholder="Enter hex (#ff6600) or keyword">
  <button id="genBtn">Generate</button>
</div>
<div id="palette"></div>
<div id="copied"></div>
<script>
const paletteEl=document.getElementById('palette'),copiedEl=document.getElementById('copied');

const KEYWORD_COLORS={red:'#e74c3c',blue:'#3498db',green:'#2ecc71',purple:'#9b59b6',orange:'#e67e22',pink:'#e91e90',yellow:'#f1c40f',teal:'#1abc9c',coral:'#ff7f50',navy:'#2c3e50',sunset:'#ff6b35',ocean:'#006994',forest:'#228b22',lavender:'#967bb6',gold:'#ffd700',mint:'#98ff98',rose:'#ff007f',sky:'#87ceeb',fire:'#ff4500',ice:'#a5f2f3',earth:'#8b4513',warm:'#ff8c42',cool:'#4a90d9',dark:'#2c2c54',light:'#f5f5dc',neon:'#39ff14',pastel:'#ffb3ba',autumn:'#d35400',spring:'#00b894',summer:'#fdcb6e',winter:'#74b9ff'};

function hexToHSL(hex){
  hex=hex.replace('#','');
  const r=parseInt(hex.substring(0,2),16)/255,g=parseInt(hex.substring(2,4),16)/255,b=parseInt(hex.substring(4,6),16)/255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){h=s=0}else{
    const d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break}
  }
  return[h*360,s*100,l*100];
}

function hslToHex(h,s,l){
  h=((h%360)+360)%360;s/=100;l/=100;
  const f=(n)=>{const k=(n+h/30)%12;const a=s*Math.min(l,1-l);return Math.round((l-a*Math.max(-1,Math.min(k-3,9-k,1)))*255)};
  return'#'+[f(0),f(8),f(4)].map(x=>x.toString(16).padStart(2,'0')).join('');
}

function generate(){
  const val=document.getElementById('input').value.trim().toLowerCase();
  let baseHex;
  if(val.match(/^#?[0-9a-f]{6}$/i)){baseHex=val.startsWith('#')?val:'#'+val}
  else if(KEYWORD_COLORS[val]){baseHex=KEYWORD_COLORS[val]}
  else{
    // random seed from string hash
    let hash=0;const str=val||'random'+Date.now();
    for(let i=0;i<str.length;i++){hash=str.charCodeAt(i)+((hash<<5)-hash);hash&=hash}
    const h=Math.abs(hash)%360;
    baseHex=hslToHex(h,70,55);
  }
  const[bh,bs,bl]=hexToHSL(baseHex);
  const colors=[
    hslToHex(bh,bs,bl),
    hslToHex(bh+30,Math.min(bs+10,100),bl-10),
    hslToHex(bh+180,bs,bl),
    hslToHex(bh-30,Math.max(bs-10,20),bl+10),
    hslToHex(bh+90,bs*0.8,bl+15)
  ];
  paletteEl.innerHTML='';copiedEl.textContent='';
  colors.forEach(c=>{
    const div=document.createElement('div');
    div.className='swatch';div.style.background=c;
    div.innerHTML=`<span>${c}</span>`;
    div.addEventListener('click',()=>{navigator.clipboard.writeText(c);copiedEl.textContent='Copied '+c+'!'});
    paletteEl.appendChild(div);
  });
}

document.getElementById('genBtn').addEventListener('click',generate);
document.getElementById('input').addEventListener('keydown',e=>{if(e.key==='Enter')generate()});
generate();
</script>
</body>
</html>
