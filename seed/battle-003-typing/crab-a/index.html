<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typing Speed Test</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#ddd;font-family:Arial,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0;padding:0;overflow:hidden;width:100vw;height:100vh}
h1{font-size:20px;margin-bottom:12px;color:#aab}
#word-display{font-size:32px;margin:14px 0;letter-spacing:2px;min-height:44px;color:#fff}
#input{width:300px;padding:10px;font-size:18px;text-align:center;background:#12122a;color:#eee;border:2px solid #444;border-radius:6px;outline:none;font-family:monospace}
#input:focus{border-color:#58a6ff}
#timer{font-size:16px;margin:10px 0;color:#888}
#stats{display:flex;gap:30px;margin:10px 0}
.stat{text-align:center}
.stat-val{font-size:24px;font-weight:bold;color:#58a6ff}
.stat-label{font-size:11px;color:#888;text-transform:uppercase}
#results{display:none;text-align:center}
#results h2{margin-bottom:10px;color:#fff;font-size:20px}
#startBtn,#restartBtn{padding:8px 24px;font-size:14px;background:#334;color:#eee;border:1px solid #556;border-radius:4px;cursor:pointer;margin-top:8px}
#startBtn:hover,#restartBtn:hover{background:#445}
</style>
</head>
<body>
<h1>Typing Speed Test</h1>
<div id="game">
  <div id="timer">60 seconds</div>
  <div id="word-display">Press Start to begin</div>
  <input type="text" id="input" placeholder="Type here..." disabled autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  <div id="stats">
    <div class="stat"><div class="stat-val" id="wpm">0</div><div class="stat-label">WPM</div></div>
    <div class="stat"><div class="stat-val" id="acc">100%</div><div class="stat-label">Accuracy</div></div>
  </div>
  <button id="startBtn">Start</button>
</div>
<div id="results">
  <h2>Results</h2>
  <div id="stats2" style="display:flex;gap:30px;justify-content:center;margin:10px 0">
    <div class="stat"><div class="stat-val" id="fwpm">0</div><div class="stat-label">WPM</div></div>
    <div class="stat"><div class="stat-val" id="facc">0%</div><div class="stat-label">Accuracy</div></div>
    <div class="stat"><div class="stat-val" id="fwords">0</div><div class="stat-label">Words</div></div>
  </div>
  <button id="restartBtn">Try Again</button>
</div>
<script>
const words=["the","be","to","of","and","a","in","that","have","it","for","not","on","with","he","as","you","do","at","this","but","his","by","from","they","we","her","she","or","an","will","my","one","all","would","there","their","what","so","up","out","if","about","who","get","which","go","me","when","make","can","like","time","no","just","him","know","take","people","into","year","your","good","some","could","them","see","other","than","then","now","look","only","come","its","over","think","also","back","after","use","two","how","our","work","first","well","way","even","new","want","because","any","these","give","day","most","us","great","help","own","need","house","try","world","much","right","too","long","still","must","big","old","open","same","last","start","keep","name","end","move","hand","place","small","part","found","live","home","next","head","hard","best"];
let timer,timeLeft,running=false,correct=0,total=0,wordsTyped=0,currentWord;
const wordEl=document.getElementById('word-display'),inputEl=document.getElementById('input'),timerEl=document.getElementById('timer'),wpmEl=document.getElementById('wpm'),accEl=document.getElementById('acc');

function pickWord(){currentWord=words[Math.floor(Math.random()*words.length)];wordEl.textContent=currentWord}
function start(){
  running=true;timeLeft=60;correct=0;total=0;wordsTyped=0;
  document.getElementById('game').style.display='block';
  document.getElementById('results').style.display='none';
  inputEl.disabled=false;inputEl.value='';inputEl.focus();
  pickWord();
  wpmEl.textContent='0';accEl.textContent='100%';
  timer=setInterval(()=>{
    timeLeft--;timerEl.textContent=timeLeft+' seconds';
    const elapsed=60-timeLeft;
    if(elapsed>0)wpmEl.textContent=Math.round(wordsTyped/(elapsed/60));
    if(timeLeft<=0)endGame();
  },1000);
}
function endGame(){
  clearInterval(timer);running=false;inputEl.disabled=true;
  document.getElementById('game').style.display='none';
  document.getElementById('results').style.display='block';
  const accuracy=total>0?Math.round((correct/total)*100):100;
  document.getElementById('fwpm').textContent=Math.round(wordsTyped);
  document.getElementById('facc').textContent=accuracy+'%';
  document.getElementById('fwords').textContent=wordsTyped;
}
inputEl.addEventListener('input',()=>{
  if(!running)return;
  const val=inputEl.value.trim();
  if(val===currentWord){
    correct+=currentWord.length;total+=currentWord.length;wordsTyped++;
    inputEl.value='';pickWord();
    accEl.textContent=Math.round((correct/total)*100)+'%';
  }
});
inputEl.addEventListener('keydown',e=>{
  if(e.key===' '){
    e.preventDefault();
    if(!running)return;
    const val=inputEl.value.trim();
    if(val.length>0){
      for(let i=0;i<Math.max(val.length,currentWord.length);i++){
        total++;
        if(val[i]===currentWord[i])correct++;
      }
      wordsTyped++;
      inputEl.value='';pickWord();
      accEl.textContent=total>0?Math.round((correct/total)*100)+'%':'100%';
    }
  }
});
document.getElementById('startBtn').addEventListener('click',start);
document.getElementById('restartBtn').addEventListener('click',start);
</script>
</body>
</html>
