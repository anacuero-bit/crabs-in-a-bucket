<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0; padding: 0; overflow: hidden; width: 100vw; height: 100vh; font-family: Arial, sans-serif; color: #eee; }
canvas { border: 2px solid #444; background: #0f0f23; display: block; }
#ui { margin-top: 8px; text-align: center; }
#score { font-size: 16px; margin-bottom: 6px; }
#restartBtn { padding: 6px 20px; font-size: 14px; background: #3a3a5c; color: #eee; border: 1px solid #666; cursor: pointer; border-radius: 4px; display: none; }
#restartBtn:hover { background: #50507a; }
</style>
</head>
<body>
<div id="score">Score: 0</div>
<canvas id="game" width="480" height="400"></canvas>
<div id="ui"><button id="restartBtn">Restart</button></div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const restartBtn = document.getElementById('restartBtn');

const COLS = 8, ROWS = 3, BRICK_W = 54, BRICK_H = 18, BRICK_PAD = 4, BRICK_TOP = 40, BRICK_LEFT = 14;
let bricks, ball, paddle, score, running, animId;

function initBricks() {
  bricks = [];
  const colors = ['#e74c3c','#f39c12','#2ecc71'];
  for (let r = 0; r < ROWS; r++) {
    bricks[r] = [];
    for (let c = 0; c < COLS; c++) {
      bricks[r][c] = { x: BRICK_LEFT + c * (BRICK_W + BRICK_PAD), y: BRICK_TOP + r * (BRICK_H + BRICK_PAD), alive: true, color: colors[r] };
    }
  }
}

function init() {
  score = 0; running = true;
  restartBtn.style.display = 'none';
  paddle = { x: canvas.width / 2 - 40, y: canvas.height - 20, w: 80, h: 10 };
  ball = { x: canvas.width / 2, y: canvas.height - 35, r: 6, dx: 3, dy: -3 };
  initBricks();
  scoreEl.textContent = 'Score: 0';
}

const keys = {};
document.addEventListener('keydown', e => { keys[e.key] = true; });
document.addEventListener('keyup', e => { keys[e.key] = false; });

function update() {
  if (keys['ArrowLeft'] && paddle.x > 0) paddle.x -= 5;
  if (keys['ArrowRight'] && paddle.x + paddle.w < canvas.width) paddle.x += 5;

  ball.x += ball.dx; ball.y += ball.dy;
  if (ball.x - ball.r < 0 || ball.x + ball.r > canvas.width) ball.dx = -ball.dx;
  if (ball.y - ball.r < 0) ball.dy = -ball.dy;

  if (ball.y + ball.r > paddle.y && ball.x > paddle.x && ball.x < paddle.x + paddle.w && ball.dy > 0) {
    ball.dy = -ball.dy;
    ball.y = paddle.y - ball.r;
  }

  if (ball.y > canvas.height) { running = false; restartBtn.style.display = 'inline-block'; return; }

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const b = bricks[r][c];
      if (!b.alive) continue;
      if (ball.x + ball.r > b.x && ball.x - ball.r < b.x + BRICK_W && ball.y + ball.r > b.y && ball.y - ball.r < b.y + BRICK_H) {
        ball.dy = -ball.dy;
        b.alive = false;
        score += 10;
        scoreEl.textContent = 'Score: ' + score;
      }
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#ccc';
  ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
  ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.fill();
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const b = bricks[r][c];
    if (b.alive) { ctx.fillStyle = b.color; ctx.fillRect(b.x, b.y, BRICK_W, BRICK_H); }
  }
  if (!running) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff'; ctx.font = '28px Arial'; ctx.textAlign = 'center';
    ctx.fillText('Game Over', canvas.width / 2, canvas.height / 2);
  }
}

function loop() {
  if (running) update();
  draw();
  animId = requestAnimationFrame(loop);
}

restartBtn.addEventListener('click', () => { init(); });
init();
loop();
</script>
</body>
</html>
