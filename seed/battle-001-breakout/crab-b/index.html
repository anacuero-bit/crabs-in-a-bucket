<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Breakout</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',Arial,sans-serif;color:#e0e0ff;overflow:hidden}
#hud{display:flex;gap:30px;margin-bottom:8px;font-size:15px;width:480px;justify-content:space-between}
.hud-item{text-transform:uppercase;letter-spacing:1px;font-size:13px;color:#88a}
.hud-val{font-size:20px;font-weight:bold;color:#0ff}
canvas{display:block;border:1px solid #224;border-radius:4px}
#msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;display:none;z-index:10}
#msg h2{font-size:32px;color:#0ff;text-shadow:0 0 20px #0ff;margin-bottom:10px}
#msg p{color:#aac;margin-bottom:16px;font-size:15px}
#msg button{padding:10px 32px;font-size:16px;background:transparent;color:#0ff;border:2px solid #0ff;border-radius:6px;cursor:pointer;text-transform:uppercase;letter-spacing:2px;transition:all .2s}
#msg button:hover{background:#0ff;color:#0a0a1a}
#touch-left,#touch-right{display:none;position:fixed;bottom:10px;width:45%;height:80px;border:1px solid #335;border-radius:10px;background:rgba(0,255,255,0.05);z-index:20;font-size:28px;color:#0ff;line-height:80px;text-align:center;user-select:none;-webkit-user-select:none}
#touch-left{left:2.5%}
#touch-right{right:2.5%}
@media(pointer:coarse){#touch-left,#touch-right{display:block}}
</style>
</head>
<body>
<div id="hud">
  <div><div class="hud-item">Score</div><div class="hud-val" id="hScore">0</div></div>
  <div><div class="hud-item">High</div><div class="hud-val" id="hHigh">0</div></div>
  <div><div class="hud-item">Level</div><div class="hud-val" id="hLevel">1</div></div>
  <div><div class="hud-item">Lives</div><div class="hud-val" id="hLives">♥♥♥</div></div>
</div>
<canvas id="c" width="480" height="440"></canvas>
<div id="msg"><h2 id="msgTitle"></h2><p id="msgSub"></p><button id="msgBtn">Play</button></div>
<div id="touch-left">◀</div>
<div id="touch-right">▶</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
const hScore=document.getElementById('hScore'),hHigh=document.getElementById('hHigh'),hLevel=document.getElementById('hLevel'),hLives=document.getElementById('hLives');
const msgBox=document.getElementById('msg'),msgTitle=document.getElementById('msgTitle'),msgSub=document.getElementById('msgSub'),msgBtn=document.getElementById('msgBtn');
const W=C.width,H=C.height;

// Audio
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq,dur,vol=0.15,type='square'){const o=AC.createOscillator(),g=AC.createGain();o.type=type;o.frequency.value=freq;g.gain.value=vol;o.connect(g);g.connect(AC.destination);o.start();g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);o.stop(AC.currentTime+dur)}
function sndHit(){beep(520,0.06)}function sndBrick(){beep(880,0.08,0.12,'sine')}function sndWall(){beep(300,0.04)}function sndDie(){beep(120,0.3,0.2,'sawtooth')}function sndPow(){beep(660,0.15,0.12,'sine');setTimeout(()=>beep(990,0.15,0.1,'sine'),80)}function sndLevel(){beep(440,0.1);setTimeout(()=>beep(660,0.1),100);setTimeout(()=>beep(880,0.15),200)}

// Particles
let particles=[];
function spawnParticles(x,y,color,n=8){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*3+1;particles.push({x,y,dx:Math.cos(a)*sp,dy:Math.sin(a)*sp,life:1,color,r:Math.random()*3+1})}}
function updateParticles(){particles=particles.filter(p=>{p.x+=p.dx;p.y+=p.dy;p.life-=0.03;return p.life>0})}
function drawParticles(){particles.forEach(p=>{X.globalAlpha=p.life;X.fillStyle=p.color;X.beginPath();X.arc(p.x,p.y,p.r,0,6.28);X.fill()});X.globalAlpha=1}

// Power-ups
let powerups=[];
const PU_TYPES=['wide','multi'];
function spawnPowerup(x,y){if(Math.random()<0.2){powerups.push({x,y,dy:1.5,type:PU_TYPES[Math.floor(Math.random()*PU_TYPES.length)],w:20,h:12})}}
function drawPowerups(){powerups.forEach(p=>{const col=p.type==='wide'?'#0f0':'#f0f';X.fillStyle=col;X.shadowColor=col;X.shadowBlur=8;X.fillRect(p.x-p.w/2,p.y,p.w,p.h);X.shadowBlur=0;X.fillStyle='#fff';X.font='9px Arial';X.textAlign='center';X.fillText(p.type==='wide'?'W':'M',p.x,p.y+9)})}

// Shake
let shakeTime=0,shakeMag=0;
function shake(mag=3,dur=6){shakeMag=mag;shakeTime=dur}

// Game state
let score,lives,level,balls,paddle,bricks,running,highScore,baseSpeed;
highScore=parseInt(localStorage.getItem('neonBreakoutHi')||'0');
hHigh.textContent=highScore;

const COLS=8,ROWS=4,BW=54,BH=16,BPAD=4,BTOP=44,BLEFT=14;
const ROW_COLORS=['#ff3366','#ff6633','#ffcc00','#00ffcc'];
const ROW_POINTS=[40,30,20,10];

function makeBricks(lv){
  const b=[];
  const rows=Math.min(ROWS+Math.floor(lv/2),7);
  for(let r=0;r<rows;r++){b[r]=[];for(let c=0;c<COLS;c++){
    let alive=true;
    if(lv>1&&Math.random()<0.1)alive=false; // gaps
    b[r][c]={x:BLEFT+c*(BW+BPAD),y:BTOP+r*(BH+BPAD),alive,color:ROW_COLORS[r%ROW_COLORS.length],pts:ROW_POINTS[r%ROW_POINTS.length]}
  }}return b;
}

function makeBall(){
  const sp=baseSpeed+level*0.3;
  const a=-Math.PI/2+(Math.random()-0.5)*0.6;
  return{x:W/2,y:H-36,r:5,dx:Math.cos(a)*sp,dy:Math.sin(a)*sp}
}

function init(lv){
  level=lv||1;score=0;lives=3;baseSpeed=3.5;
  paddle={x:W/2-45,y:H-22,w:90,h:10,glow:0};
  bricks=makeBricks(level);
  balls=[makeBall()];
  powerups=[];particles=[];shakeTime=0;
  running=true;msgBox.style.display='none';
  updateHUD();
}

function nextLevel(){
  level++;sndLevel();
  bricks=makeBricks(level);
  balls=[makeBall()];
  powerups=[];
  paddle.w=90;
  updateHUD();
}

function updateHUD(){
  hScore.textContent=score;hLevel.textContent=level;
  hLives.textContent='♥'.repeat(Math.max(0,lives));
  if(score>highScore){highScore=score;localStorage.setItem('neonBreakoutHi',highScore);hHigh.textContent=highScore}
}

function showMsg(title,sub){running=false;msgTitle.textContent=title;msgSub.textContent=sub;msgBox.style.display='block'}

// Input
const keys={};
document.addEventListener('keydown',e=>{keys[e.key]=true;if(['ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault()});
document.addEventListener('keyup',e=>{keys[e.key]=false});

// Touch
let touchDir=0;
function tstart(d){return e=>{e.preventDefault();touchDir=d;if(AC.state==='suspended')AC.resume()}}
function tend(e){e.preventDefault();touchDir=0}
document.getElementById('touch-left').addEventListener('touchstart',tstart(-1));
document.getElementById('touch-left').addEventListener('touchend',tend);
document.getElementById('touch-right').addEventListener('touchstart',tstart(1));
document.getElementById('touch-right').addEventListener('touchend',tend);
C.addEventListener('touchstart',e=>{if(AC.state==='suspended')AC.resume()});

function update(){
  const spd=6;
  if(keys['ArrowLeft']||touchDir<0)paddle.x=Math.max(0,paddle.x-spd);
  if(keys['ArrowRight']||touchDir>0)paddle.x=Math.min(W-paddle.w,paddle.x+spd);
  paddle.glow*=0.92;

  // Balls
  balls.forEach(ball=>{
    ball.x+=ball.dx;ball.y+=ball.dy;
    if(ball.x-ball.r<0){ball.dx=Math.abs(ball.dx);ball.x=ball.r;sndWall()}
    if(ball.x+ball.r>W){ball.dx=-Math.abs(ball.dx);ball.x=W-ball.r;sndWall()}
    if(ball.y-ball.r<0){ball.dy=Math.abs(ball.dy);ball.y=ball.r;sndWall()}

    // Paddle
    if(ball.dy>0&&ball.y+ball.r>=paddle.y&&ball.y+ball.r<=paddle.y+paddle.h+4&&ball.x>=paddle.x-ball.r&&ball.x<=paddle.x+paddle.w+ball.r){
      const hit=(ball.x-(paddle.x+paddle.w/2))/(paddle.w/2);
      const sp=Math.sqrt(ball.dx*ball.dx+ball.dy*ball.dy);
      const ang=-Math.PI/2+hit*Math.PI/3;
      ball.dx=Math.cos(ang)*sp;ball.dy=Math.sin(ang)*sp;
      if(ball.dy>0)ball.dy=-ball.dy;
      ball.y=paddle.y-ball.r;
      paddle.glow=1;shake(2,5);sndHit();
    }
  });

  // Remove fallen balls
  balls=balls.filter(b=>b.y<H+20);
  if(balls.length===0){
    lives--;updateHUD();sndDie();
    if(lives<=0){showMsg('Game Over','Score: '+score);return}
    balls=[makeBall()];paddle.w=90;powerups=[];
  }

  // Bricks
  let remaining=0;
  for(let r=0;r<bricks.length;r++)for(let c=0;c<COLS;c++){
    const b=bricks[r][c];if(!b.alive)continue;remaining++;
    balls.forEach(ball=>{
      if(ball.x+ball.r>b.x&&ball.x-ball.r<b.x+BW&&ball.y+ball.r>b.y&&ball.y-ball.r<b.y+BH){
        ball.dy=-ball.dy;b.alive=false;remaining--;
        score+=b.pts;updateHUD();sndBrick();
        spawnParticles(b.x+BW/2,b.y+BH/2,b.color,10);
        spawnPowerup(b.x+BW/2,b.y+BH/2);
        // speed up slightly
        const sp=Math.sqrt(ball.dx*ball.dx+ball.dy*ball.dy);
        const nsp=Math.min(sp*1.005,8);
        const f=nsp/sp;ball.dx*=f;ball.dy*=f;
      }
    });
  }
  if(remaining===0)nextLevel();

  // Power-ups
  powerups.forEach(p=>{p.y+=p.dy});
  powerups=powerups.filter(p=>{
    if(p.y>H)return false;
    if(p.y+p.h>=paddle.y&&p.x>=paddle.x&&p.x<=paddle.x+paddle.w){
      sndPow();
      if(p.type==='wide'){paddle.w=Math.min(paddle.w+30,180)}
      if(p.type==='multi'){const nb=makeBall();nb.x=balls[0]?balls[0].x:W/2;nb.y=balls[0]?balls[0].y:H/2;balls.push(nb)}
      return false;
    }return true;
  });

  updateParticles();
  if(shakeTime>0)shakeTime--;
}

function draw(){
  X.save();
  if(shakeTime>0){X.translate((Math.random()-0.5)*shakeMag*2,(Math.random()-0.5)*shakeMag*2)}
  X.clearRect(-10,-10,W+20,H+20);
  X.fillStyle='#0a0a1a';X.fillRect(0,0,W,H);

  // Bricks
  for(let r=0;r<bricks.length;r++)for(let c=0;c<COLS;c++){
    const b=bricks[r][c];if(!b.alive)continue;
    const g=X.createLinearGradient(b.x,b.y,b.x,b.y+BH);
    g.addColorStop(0,b.color);g.addColorStop(1,'#111');
    X.fillStyle=g;X.shadowColor=b.color;X.shadowBlur=6;
    X.beginPath();X.roundRect(b.x,b.y,BW,BH,3);X.fill();
    X.shadowBlur=0;
  }

  // Paddle
  const pglow=paddle.glow*20;
  X.shadowColor='#0ff';X.shadowBlur=10+pglow;
  const pg=X.createLinearGradient(paddle.x,paddle.y,paddle.x+paddle.w,paddle.y);
  pg.addColorStop(0,'#0aa');pg.addColorStop(0.5,'#0ff');pg.addColorStop(1,'#0aa');
  X.fillStyle=pg;
  X.beginPath();X.roundRect(paddle.x,paddle.y,paddle.w,paddle.h,5);X.fill();
  X.shadowBlur=0;

  // Balls
  balls.forEach(b=>{X.beginPath();X.arc(b.x,b.y,b.r,0,6.28);X.fillStyle='#fff';X.shadowColor='#fff';X.shadowBlur=12;X.fill();X.shadowBlur=0});

  drawPowerups();
  drawParticles();
  X.restore();
}

function loop(){
  if(running)update();
  draw();
  requestAnimationFrame(loop);
}

msgBtn.addEventListener('click',()=>{if(AC.state==='suspended')AC.resume();init(1)});
showMsg('Neon Breakout','Arrow keys to move. Break all bricks!');
hHigh.textContent=highScore;
loop();
</script>
</body>
</html>
