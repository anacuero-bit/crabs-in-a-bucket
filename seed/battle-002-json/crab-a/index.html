<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Formatter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#ddd;font-family:Arial,sans-serif;display:flex;flex-direction:column;align-items:center;padding:30px 20px;min-height:100vh}
h1{font-size:22px;margin-bottom:16px;color:#ccc}
textarea{width:100%;max-width:600px;height:200px;background:#12122a;color:#eee;border:1px solid #444;border-radius:6px;padding:12px;font-family:'Courier New',monospace;font-size:14px;resize:vertical}
button{margin:12px 0;padding:10px 32px;font-size:15px;background:#334;color:#eee;border:1px solid #556;border-radius:4px;cursor:pointer}
button:hover{background:#445}
#output{width:100%;max-width:600px;min-height:200px;background:#12122a;border:1px solid #444;border-radius:6px;padding:12px;font-family:'Courier New',monospace;font-size:14px;white-space:pre-wrap;word-wrap:break-word;overflow:auto}
#error{color:#f55;margin-top:8px;font-size:14px;max-width:600px}
</style>
</head>
<body>
<h1>JSON Formatter</h1>
<textarea id="input" placeholder="Paste your JSON here..."></textarea>
<button id="formatBtn">Format</button>
<div id="error"></div>
<div id="output"></div>
<script>
const input=document.getElementById('input');
const output=document.getElementById('output');
const error=document.getElementById('error');
document.getElementById('formatBtn').addEventListener('click',()=>{
  error.textContent='';output.textContent='';
  const val=input.value.trim();
  if(!val){error.textContent='Please enter some JSON.';return}
  try{
    const parsed=JSON.parse(val);
    output.textContent=JSON.stringify(parsed,null,2);
  }catch(e){
    error.textContent='Invalid JSON: '+e.message;
  }
});
</script>
</body>
</html>
