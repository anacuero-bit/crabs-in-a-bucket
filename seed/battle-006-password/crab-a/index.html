<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: #c9d1d9;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .app {
    width: 100%;
    max-width: 480px;
    padding: 20px;
  }
  h1 {
    text-align: center;
    font-size: 1.5rem;
    margin-bottom: 6px;
    color: #58a6ff;
  }
  .subtitle {
    text-align: center;
    color: #484f58;
    font-size: 0.85rem;
    margin-bottom: 28px;
  }
  .password-display {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 20px;
    position: relative;
  }
  .password-text {
    font-family: 'Courier New', monospace;
    font-size: 1.35rem;
    word-break: break-all;
    line-height: 1.6;
    min-height: 2.5em;
    color: #e6edf3;
    padding-right: 50px;
    letter-spacing: 1px;
  }
  .copy-btn {
    position: absolute;
    top: 16px;
    right: 16px;
    background: #21262d;
    border: 1px solid #30363d;
    color: #8b949e;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
  }
  .copy-btn:hover { background: #30363d; color: #c9d1d9; }
  .copy-btn.copied { background: #238636; color: #fff; border-color: #238636; }
  .strength-bar {
    height: 6px;
    background: #21262d;
    border-radius: 3px;
    margin-top: 12px;
    overflow: hidden;
  }
  .strength-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s, background 0.3s;
    width: 0%;
  }
  .strength-label {
    margin-top: 6px;
    font-size: 0.78rem;
    text-align: right;
    font-weight: 600;
    transition: color 0.3s;
  }
  .section {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #484f58;
    margin-bottom: 14px;
  }
  .slider-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .slider-row input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    background: #21262d;
    border-radius: 3px;
    outline: none;
  }
  .slider-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    background: #58a6ff;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 6px rgba(88,166,255,0.4);
  }
  .slider-val {
    font-size: 1.4rem;
    font-weight: bold;
    color: #58a6ff;
    min-width: 32px;
    text-align: center;
  }
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .option {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: #0d1117;
    border: 1px solid #21262d;
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 0.2s;
    user-select: none;
  }
  .option:hover { border-color: #30363d; }
  .option input[type="checkbox"] { display: none; }
  .option .check {
    width: 18px;
    height: 18px;
    border: 2px solid #30363d;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .option input:checked + .check {
    background: #58a6ff;
    border-color: #58a6ff;
  }
  .option input:checked + .check::after {
    content: '\2713';
    color: #fff;
    font-size: 12px;
    font-weight: bold;
  }
  .option .label {
    font-size: 0.9rem;
  }
  .option .example {
    color: #484f58;
    font-size: 0.75rem;
    font-family: monospace;
  }
  .generate-btn {
    width: 100%;
    padding: 14px;
    background: #238636;
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    letter-spacing: 0.5px;
  }
  .generate-btn:hover { background: #2ea043; }
  .generate-btn:active { transform: scale(0.98); }
</style>
</head>
<body>
<div class="app">
  <h1>Password Generator</h1>
  <p class="subtitle">Generate strong, secure passwords</p>

  <div class="password-display">
    <div class="password-text" id="password">Click generate to start</div>
    <button class="copy-btn" id="copyBtn" onclick="copyPassword()">Copy</button>
    <div class="strength-bar">
      <div class="strength-fill" id="strengthFill"></div>
    </div>
    <div class="strength-label" id="strengthLabel">&nbsp;</div>
  </div>

  <div class="section">
    <div class="section-title">Length</div>
    <div class="slider-row">
      <input type="range" id="length" min="4" max="64" value="16" oninput="updateLength()">
      <span class="slider-val" id="lengthVal">16</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Character Types</div>
    <div class="options">
      <label class="option">
        <input type="checkbox" id="upper" checked>
        <span class="check"></span>
        <div>
          <div class="label">Uppercase</div>
          <div class="example">A-Z</div>
        </div>
      </label>
      <label class="option">
        <input type="checkbox" id="lower" checked>
        <span class="check"></span>
        <div>
          <div class="label">Lowercase</div>
          <div class="example">a-z</div>
        </div>
      </label>
      <label class="option">
        <input type="checkbox" id="numbers" checked>
        <span class="check"></span>
        <div>
          <div class="label">Numbers</div>
          <div class="example">0-9</div>
        </div>
      </label>
      <label class="option">
        <input type="checkbox" id="symbols" checked>
        <span class="check"></span>
        <div>
          <div class="label">Symbols</div>
          <div class="example">!@#$%</div>
        </div>
      </label>
    </div>
  </div>

  <button class="generate-btn" onclick="generate()">Generate Password</button>
</div>

<script>
const chars = {
  upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
  lower: 'abcdefghijklmnopqrstuvwxyz',
  numbers: '0123456789',
  symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
};

function updateLength() {
  document.getElementById('lengthVal').textContent = document.getElementById('length').value;
}

function generate() {
  const len = parseInt(document.getElementById('length').value);
  const types = ['upper','lower','numbers','symbols'].filter(t => document.getElementById(t).checked);

  if (types.length === 0) {
    document.getElementById('password').textContent = 'Select at least one type';
    return;
  }

  let pool = types.map(t => chars[t]).join('');
  let pw = '';

  // Ensure at least one from each selected type
  types.forEach(t => {
    const c = chars[t];
    pw += c[Math.floor(Math.random() * c.length)];
  });

  for (let i = pw.length; i < len; i++) {
    pw += pool[Math.floor(Math.random() * pool.length)];
  }

  // Shuffle
  pw = pw.split('').sort(() => Math.random() - 0.5).join('');

  document.getElementById('password').textContent = pw;
  updateStrength(pw, types.length);
}

function updateStrength(pw, typeCount) {
  const len = pw.length;
  let score = 0;
  if (len >= 8) score++;
  if (len >= 12) score++;
  if (len >= 16) score++;
  if (len >= 24) score++;
  score += Math.min(typeCount, 4);

  // Entropy estimate
  let poolSize = 0;
  if (/[a-z]/.test(pw)) poolSize += 26;
  if (/[A-Z]/.test(pw)) poolSize += 26;
  if (/[0-9]/.test(pw)) poolSize += 10;
  if (/[^a-zA-Z0-9]/.test(pw)) poolSize += 30;
  const entropy = Math.log2(poolSize) * len;

  let level, color, pct;
  if (entropy < 30) { level = 'Very Weak'; color = '#f85149'; pct = 15; }
  else if (entropy < 50) { level = 'Weak'; color = '#d29922'; pct = 35; }
  else if (entropy < 70) { level = 'Fair'; color = '#e3b341'; pct = 55; }
  else if (entropy < 90) { level = 'Strong'; color = '#3fb950'; pct = 78; }
  else { level = 'Very Strong'; color = '#58a6ff'; pct = 100; }

  const fill = document.getElementById('strengthFill');
  fill.style.width = pct + '%';
  fill.style.background = color;

  const label = document.getElementById('strengthLabel');
  label.textContent = `${level} (${Math.round(entropy)} bits)`;
  label.style.color = color;
}

function copyPassword() {
  const pw = document.getElementById('password').textContent;
  if (pw === 'Click generate to start' || pw === 'Select at least one type') return;

  navigator.clipboard.writeText(pw).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy';
      btn.classList.remove('copied');
    }, 2000);
  });
}

// Generate one on load
generate();
</script>
</body>
</html>
