<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game - Crab B</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #eee;
    overflow: hidden;
    user-select: none;
  }
  #hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 400px;
    max-width: 95vw;
    margin-bottom: 10px;
  }
  .hud-item {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .hud-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #555; }
  .hud-value { font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .hud-value.score-val { color: #ff6bff; }
  .hud-value.high-val { color: #6bffff; }
  .hud-value.speed-val { color: #ffaa00; font-size: 14px; }
  #level-bar {
    width: 400px;
    max-width: 95vw;
    height: 3px;
    background: #1a1a2a;
    border-radius: 2px;
    margin-bottom: 6px;
    overflow: hidden;
  }
  #level-fill {
    height: 100%;
    background: linear-gradient(90deg, #ff6bff, #6bffff);
    transition: width 0.3s ease;
    border-radius: 2px;
  }
  canvas {
    border: 1px solid #1a1a2a;
    border-radius: 8px;
    display: block;
  }
  #overlay {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
  }
  #overlay.clickable { pointer-events: auto; }
  #overlay h1 { font-size: 42px; margin-bottom: 6px; }
  #overlay h2 { font-size: 28px; color: #ff6bff; margin-bottom: 8px; }
  #overlay .sub { color: #666; font-size: 14px; margin-bottom: 20px; }
  #overlay .final { font-size: 48px; font-weight: 800; color: #ff6bff; margin: 10px 0; }
  #overlay .new-hs { font-size: 14px; color: #ffaa00; margin-bottom: 12px; }
  #overlay button {
    background: linear-gradient(135deg, #ff6bff, #6bffff);
    color: #0a0a0f;
    border: none;
    padding: 14px 40px;
    font-size: 16px;
    border-radius: 50px;
    cursor: pointer;
    font-weight: 700;
    letter-spacing: 1px;
    pointer-events: auto;
  }
  #overlay button:hover { filter: brightness(1.1); }
  #mobile-controls {
    display: none;
    margin-top: 10px;
    gap: 0;
  }
  .ctrl-row { display: flex; justify-content: center; gap: 4px; }
  .ctrl-btn {
    width: 60px; height: 60px;
    background: #141420;
    border: 1px solid #2a2a3a;
    border-radius: 12px;
    color: #888;
    font-size: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .ctrl-btn:active { background: #2a2a3a; color: #fff; }
  .ctrl-spacer { width: 60px; height: 60px; }
  @media (hover: none) and (pointer: coarse) {
    #mobile-controls { display: flex; flex-direction: column; align-items: center; }
  }
  #combo {
    position: fixed;
    top: 20%;
    font-size: 32px;
    font-weight: 800;
    color: #ffaa00;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
</style>
</head>
<body>
  <div id="hud">
    <div class="hud-item">
      <span class="hud-label">Score</span>
      <span class="hud-value score-val" id="score">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">Level</span>
      <span class="hud-value speed-val" id="level">1</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">Best</span>
      <span class="hud-value high-val" id="high-score">0</span>
    </div>
  </div>
  <div id="level-bar"><div id="level-fill" style="width:0%"></div></div>
  <canvas id="game" width="400" height="400"></canvas>
  <div id="combo"></div>
  <div id="overlay" class="clickable">
    <h1>🐍</h1>
    <h2>SNAKE</h2>
    <div class="sub">Arrow keys or swipe to move</div>
    <button onclick="startGame()">PLAY</button>
  </div>
  <div id="mobile-controls">
    <div class="ctrl-row">
      <div class="ctrl-spacer"></div>
      <div class="ctrl-btn" ontouchstart="setDir(0,-1)">▲</div>
      <div class="ctrl-spacer"></div>
    </div>
    <div class="ctrl-row">
      <div class="ctrl-btn" ontouchstart="setDir(-1,0)">◀</div>
      <div class="ctrl-btn" ontouchstart="setDir(0,1)">▼</div>
      <div class="ctrl-btn" ontouchstart="setDir(1,0)">▶</div>
    </div>
  </div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const maxW = Math.min(400, window.innerWidth - 20);
canvas.width = maxW; canvas.height = maxW;
document.getElementById('hud').style.width = maxW + 'px';
document.getElementById('level-bar').style.width = maxW + 'px';

const G = 20, C = canvas.width / G;
let snake, dir, nextDir, food, score, level, highScore, gameLoop, running;
let particles = [], shakeX = 0, shakeY = 0, comboCount = 0, comboTimer = 0;
let foodPulse = 0;

// Audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTone(freq, dur, type='square', vol=0.08) {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.value = vol;
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
function eatSound() { playTone(520, 0.1); setTimeout(() => playTone(680, 0.08), 50); }
function dieSound() { playTone(200, 0.3, 'sawtooth', 0.1); setTimeout(() => playTone(100, 0.4, 'sawtooth', 0.08), 100); }
function levelSound() { playTone(440, 0.08); setTimeout(() => playTone(554, 0.08), 80); setTimeout(() => playTone(659, 0.12), 160); }

highScore = parseInt(localStorage.getItem('snakeB_hs') || '0');
document.getElementById('high-score').textContent = highScore;

function init() {
  snake = [];
  for (let i = 0; i < 3; i++) snake.push({ x: 10 - i, y: 10 });
  dir = { x: 1, y: 0 }; nextDir = { ...dir };
  score = 0; level = 1; comboCount = 0;
  particles = [];
  document.getElementById('score').textContent = '0';
  document.getElementById('level').textContent = '1';
  document.getElementById('level-fill').style.width = '0%';
  spawnFood();
}

function spawnFood() {
  do { food = { x: Math.floor(Math.random() * G), y: Math.floor(Math.random() * G) }; }
  while (snake.some(s => s.x === food.x && s.y === food.y));
  foodPulse = 0;
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x: x * C + C / 2, y: y * C + C / 2,
      vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6,
      life: 1, color, size: Math.random() * 4 + 2
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.life -= 0.03;
    p.vx *= 0.96; p.vy *= 0.96;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function draw() {
  ctx.save();
  ctx.translate(shakeX, shakeY);
  shakeX *= -0.5; shakeY *= -0.5;
  if (Math.abs(shakeX) < 0.5) shakeX = 0;
  if (Math.abs(shakeY) < 0.5) shakeY = 0;

  // Background
  ctx.fillStyle = '#0d0d18';
  ctx.fillRect(-5, -5, canvas.width + 10, canvas.height + 10);

  // Subtle grid dots
  ctx.fillStyle = '#16162a';
  for (let x = 0; x < G; x++)
    for (let y = 0; y < G; y++)
      ctx.fillRect(x * C + C / 2 - 0.5, y * C + C / 2 - 0.5, 1, 1);

  // Food with pulse glow
  foodPulse += 0.08;
  const pulseR = C / 2 + Math.sin(foodPulse) * 3;
  const glow = ctx.createRadialGradient(
    food.x * C + C / 2, food.y * C + C / 2, 0,
    food.x * C + C / 2, food.y * C + C / 2, C * 1.5
  );
  glow.addColorStop(0, 'rgba(255,107,255,0.3)');
  glow.addColorStop(1, 'rgba(255,107,255,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(food.x * C - C, food.y * C - C, C * 3, C * 3);

  ctx.fillStyle = '#ff6bff';
  ctx.beginPath();
  ctx.arc(food.x * C + C / 2, food.y * C + C / 2, pulseR - 4, 0, Math.PI * 2);
  ctx.fill();

  // Snake with gradient body
  snake.forEach((seg, i) => {
    const t = i / snake.length;
    const r = Math.round(107 + (107 - 20) * t);
    const g = Math.round(255 - (255 - 200) * t);
    const b = Math.round(255 - (255 - 255) * t);
    const radius = C / 2 - 1 - t * 2;

    // Glow for head
    if (i === 0) {
      const headGlow = ctx.createRadialGradient(
        seg.x * C + C / 2, seg.y * C + C / 2, 0,
        seg.x * C + C / 2, seg.y * C + C / 2, C * 1.2
      );
      headGlow.addColorStop(0, 'rgba(107,255,255,0.25)');
      headGlow.addColorStop(1, 'rgba(107,255,255,0)');
      ctx.fillStyle = headGlow;
      ctx.fillRect(seg.x * C - C, seg.y * C - C, C * 3, C * 3);
    }

    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.beginPath();
    ctx.roundRect(
      seg.x * C + (C / 2 - radius),
      seg.y * C + (C / 2 - radius),
      radius * 2, radius * 2, radius * 0.4
    );
    ctx.fill();

    // Eyes on head
    if (i === 0) {
      const ex = seg.x * C + C / 2 + dir.x * 4;
      const ey = seg.y * C + C / 2 + dir.y * 4;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(ex - dir.y * 3, ey + dir.x * 3, 2.5, 0, Math.PI * 2);
      ctx.arc(ex + dir.y * 3, ey - dir.x * 3, 2.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#0a0a0f';
      ctx.beginPath();
      ctx.arc(ex - dir.y * 3 + dir.x, ey + dir.x * 3 + dir.y, 1.2, 0, Math.PI * 2);
      ctx.arc(ex + dir.y * 3 + dir.x, ey - dir.x * 3 + dir.y, 1.2, 0, Math.PI * 2);
      ctx.fill();
    }
  });

  drawParticles();
  ctx.restore();
}

function update() {
  dir = { ...nextDir };
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  if (head.x < 0 || head.x >= G || head.y < 0 || head.y >= G ||
      snake.some(s => s.x === head.x && s.y === head.y)) {
    endGame();
    return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    comboCount++;
    const pts = comboCount >= 3 ? score : score;
    document.getElementById('score').textContent = score;

    eatSound();
    spawnParticles(food.x, food.y, '#ff6bff', 12);
    shakeX = (Math.random() - 0.5) * 6;
    shakeY = (Math.random() - 0.5) * 6;

    // Combo display
    if (comboCount >= 3) {
      const comboEl = document.getElementById('combo');
      comboEl.textContent = `${comboCount}x COMBO!`;
      comboEl.style.opacity = '1';
      clearTimeout(comboTimer);
      comboTimer = setTimeout(() => { comboEl.style.opacity = '0'; }, 800);
    }

    // Level up every 5 food
    const newLevel = Math.floor(score / 5) + 1;
    if (newLevel > level) {
      level = newLevel;
      document.getElementById('level').textContent = level;
      levelSound();
    }
    document.getElementById('level-fill').style.width = ((score % 5) / 5 * 100) + '%';

    spawnFood();
  } else {
    snake.pop();
    comboCount = 0;
  }

  updateParticles();
  draw();
}

function getSpeed() { return Math.max(55, 125 - (level - 1) * 8); }

function gameStep() {
  update();
  if (running) gameLoop = setTimeout(gameStep, getSpeed());
}

function startGame() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  init();
  running = true;
  document.getElementById('overlay').style.display = 'none';
  gameStep();
}

function endGame() {
  running = false;
  clearTimeout(gameLoop);
  dieSound();

  // Death particles from snake
  snake.forEach(s => spawnParticles(s.x, s.y, '#6bffff', 3));
  // Animate remaining particles
  let deathFrames = 0;
  function deathAnim() {
    if (deathFrames++ < 30) {
      updateParticles();
      draw();
      requestAnimationFrame(deathAnim);
    } else {
      showGameOver();
    }
  }
  deathAnim();
}

function showGameOver() {
  const isNew = score > highScore;
  if (isNew) {
    highScore = score;
    localStorage.setItem('snakeB_hs', highScore.toString());
    document.getElementById('high-score').textContent = highScore;
  }
  const ov = document.getElementById('overlay');
  ov.innerHTML = `
    <h2>GAME OVER</h2>
    <div class="final">${score}</div>
    ${isNew ? '<div class="new-hs">★ NEW HIGH SCORE ★</div>' : ''}
    <div class="sub">Level ${level} reached</div>
    <button onclick="startGame()">PLAY AGAIN</button>
  `;
  ov.style.display = 'block';
  ov.classList.add('clickable');
}

function setDir(x, y) {
  if (x !== -dir.x || y !== -dir.y) nextDir = { x, y };
}

document.addEventListener('keydown', (e) => {
  const map = { ArrowUp: [0,-1], ArrowDown: [0,1], ArrowLeft: [-1,0], ArrowRight: [1,0], w: [0,-1], s: [0,1], a: [-1,0], d: [1,0] };
  if (map[e.key]) { e.preventDefault(); setDir(...map[e.key]); }
  if (e.code === 'Space') { e.preventDefault(); if (!running) startGame(); }
});

// Touch swipe
let touchStart = null;
canvas.addEventListener('touchstart', (e) => { touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY }; }, { passive: true });
canvas.addEventListener('touchend', (e) => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
  if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0);
  else setDir(0, dy > 0 ? 1 : -1);
  touchStart = null;
}, { passive: true });

init();
draw();
</script>
</body>
</html>
