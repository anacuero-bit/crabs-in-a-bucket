<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game - Crab A</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
    color: #eee;
    overflow: hidden;
  }
  #score-bar {
    display: flex;
    justify-content: space-between;
    width: 400px;
    max-width: 95vw;
    margin-bottom: 8px;
    font-size: 16px;
  }
  #score-bar span { color: #4ecca3; }
  canvas {
    border: 2px solid #4ecca3;
    border-radius: 4px;
    display: block;
    background: #16213e;
  }
  #game-over {
    display: none;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.85);
    padding: 40px;
    border-radius: 12px;
    text-align: center;
    border: 2px solid #4ecca3;
  }
  #game-over h2 { color: #e94560; font-size: 28px; margin-bottom: 10px; }
  #game-over p { color: #aaa; margin-bottom: 20px; }
  #game-over button {
    background: #4ecca3;
    color: #1a1a2e;
    border: none;
    padding: 12px 32px;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
  }
  #game-over button:hover { background: #3daa8a; }
  #instructions {
    margin-top: 8px;
    font-size: 12px;
    color: #666;
  }
</style>
</head>
<body>
  <div id="score-bar">
    <div>Score: <span id="score">0</span></div>
    <div>High Score: <span id="high-score">0</span></div>
  </div>
  <canvas id="game" width="400" height="400"></canvas>
  <div id="instructions">Arrow keys to move. Press Space to start.</div>
  <div id="game-over">
    <h2>Game Over!</h2>
    <p>Final Score: <span id="final-score">0</span></p>
    <button onclick="resetGame()">Play Again</button>
  </div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Responsive sizing
const maxW = Math.min(400, window.innerWidth - 20);
canvas.width = maxW;
canvas.height = maxW;
document.getElementById('score-bar').style.width = maxW + 'px';

const GRID = 20;
const CELL = canvas.width / GRID;

let snake, dir, food, score, highScore, gameOver, started, speed, interval;

highScore = parseInt(localStorage.getItem('snakeA_hs') || '0');
document.getElementById('high-score').textContent = highScore;

function init() {
  snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
  dir = { x: 1, y: 0 };
  score = 0;
  speed = 120;
  gameOver = false;
  started = false;
  document.getElementById('score').textContent = '0';
  document.getElementById('game-over').style.display = 'none';
  spawnFood();
  draw();
}

function spawnFood() {
  do {
    food = { x: Math.floor(Math.random() * GRID), y: Math.floor(Math.random() * GRID) };
  } while (snake.some(s => s.x === food.x && s.y === food.y));
}

function draw() {
  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid lines (subtle)
  ctx.strokeStyle = '#1a2540';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= GRID; i++) {
    ctx.beginPath();
    ctx.moveTo(i * CELL, 0);
    ctx.lineTo(i * CELL, canvas.height);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, i * CELL);
    ctx.lineTo(canvas.width, i * CELL);
    ctx.stroke();
  }

  // Snake
  snake.forEach((seg, i) => {
    ctx.fillStyle = i === 0 ? '#4ecca3' : '#3daa8a';
    ctx.fillRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2);
  });

  // Food
  ctx.fillStyle = '#e94560';
  ctx.beginPath();
  ctx.arc(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, CELL / 2 - 2, 0, Math.PI * 2);
  ctx.fill();

  if (!started) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = '20px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('Press SPACE to Start', canvas.width / 2, canvas.height / 2);
  }
}

function update() {
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wall collision
  if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
    endGame();
    return;
  }

  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    endGame();
    return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    document.getElementById('score').textContent = score;
    spawnFood();
    // Speed up slightly
    if (speed > 60) {
      speed -= 2;
      clearInterval(interval);
      interval = setInterval(update, speed);
    }
  } else {
    snake.pop();
  }

  draw();
}

function endGame() {
  gameOver = true;
  clearInterval(interval);
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('snakeA_hs', highScore.toString());
    document.getElementById('high-score').textContent = highScore;
  }
  document.getElementById('final-score').textContent = score;
  document.getElementById('game-over').style.display = 'block';
}

function resetGame() {
  init();
}

let nextDir = null;

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (!started && !gameOver) {
      started = true;
      interval = setInterval(update, speed);
      draw();
    } else if (gameOver) {
      resetGame();
    }
    return;
  }

  const keyMap = {
    ArrowUp: { x: 0, y: -1 },
    ArrowDown: { x: 0, y: 1 },
    ArrowLeft: { x: -1, y: 0 },
    ArrowRight: { x: 1, y: 0 },
  };

  if (keyMap[e.key]) {
    e.preventDefault();
    const nd = keyMap[e.key];
    // Prevent reversing
    if (nd.x !== -dir.x || nd.y !== -dir.y) {
      dir = nd;
    }
  }
});

init();
</script>
</body>
</html>
